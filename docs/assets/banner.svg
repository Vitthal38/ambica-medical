<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Ambica Medical — Healthcare commerce platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#022c22"/>
      <stop offset="0.55" stop-color="#065f46"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- Decorative EKG / heartbeat line across the band -->
  <path d="M0 250 L380 250 L410 250 L430 180 L455 300 L485 130 L512 250 L900 250 L930 250 L950 210 L972 280 L995 250 L1280 250"
        fill="none" stroke="url(#accent)" stroke-width="3" stroke-opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cross emblem (medical) -->
  <g transform="translate(96,96)">
    <rect x="0" y="0" width="128" height="128" rx="28" fill="#ffffff" fill-opacity="0.08" stroke="url(#accent)" stroke-width="2"/>
    <rect x="52" y="24" width="24" height="80" rx="6" fill="url(#accent)"/>
    <rect x="24" y="52" width="80" height="24" rx="6" fill="url(#accent)"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(264,118)">
    <text x="0" y="0" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-weight="800" font-size="64" fill="#ffffff" letter-spacing="-1.5">Ambica Medical</text>
    <text x="2" y="44" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-weight="500" font-size="26" fill="#a7f3d0">Healthcare commerce &amp; pharmacy operations platform</text>
    <!-- Tag chips -->
    <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="600" font-size="16" fill="#022c22">
      <g transform="translate(0,76)">
        <rect width="150" height="34" rx="17" fill="url(#accent)"/>
        <text x="75" y="22" text-anchor="middle">Next.js 16 · React 19</text>
      </g>
      <g transform="translate(162,76)">
        <rect width="180" height="34" rx="17" fill="#ffffff" fill-opacity="0.92"/>
        <text x="90" y="22" text-anchor="middle">Prisma · PostgreSQL</text>
      </g>
      <g transform="translate(354,76)">
        <rect width="196" height="34" rx="17" fill="#ffffff" fill-opacity="0.92"/>
        <text x="98" y="22" text-anchor="middle">TypeScript end-to-end</text>
      </g>
    </g>
  </g>

  <!-- Right-side stat block -->
  <g transform="translate(1010,70)" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <g>
      <text x="0" y="0" font-size="40" font-weight="800" fill="url(#accent)">516</text>
      <text x="0" y="26" font-size="15" fill="#a7f3d0">SKU catalog</text>
    </g>
    <g transform="translate(0,70)">
      <text x="0" y="0" font-size="40" font-weight="800" fill="url(#accent)">HIPAA-style</text>
      <text x="0" y="26" font-size="15" fill="#a7f3d0">immutable audit log</text>
    </g>
    <g transform="translate(0,140)">
      <text x="0" y="0" font-size="40" font-weight="800" fill="url(#accent)">D&amp;C + DPDP</text>
      <text x="0" y="26" font-size="15" fill="#a7f3d0">compliance-aware</text>
    </g>
  </g>
</svg>
