name: ✨ Feature request
description: Suggest an idea or improvement
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user/operator pain, not just the solution.
      placeholder: Pharmacists can't see which refills are overdue at a glance…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Storefront
        - Admin / dispensary CRM
        - Image pipeline
        - Auth / security
        - API
        - Deployment / infra
        - Documentation
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This doesn't add a fake/placeholder feature or bloat
        - label: This respects the existing security & PHI handling rules
